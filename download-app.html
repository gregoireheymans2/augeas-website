<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Augeas – Download the App</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --border: rgba(255,255,255,0.08);
      --yellow: #F5C842;
      --green: #4CAF50;
      --blue: #2196F3;
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      overflow-x: hidden;
    }

    /* Background noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Logo */
    .logo-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    .logo-dots {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .dots-row {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }
    .dot-y { background: var(--yellow); }
    .dot-b { background: var(--blue); }
    .dot-g { background: var(--green); }

    .logo-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }

    .logo-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: #111;
      letter-spacing: 0.22em;
    }

    .logo-tagline {
      font-size: 9px;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Headline */
    .headline {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.25s forwards;
    }

    .headline h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 9vw, 46px);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }

    .headline p {
      margin-top: 12px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.02em;
      font-weight: 300;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--yellow), var(--green));
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }

    /* Buttons */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 32px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px;
      text-decoration: none;
      color: #111;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .store-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    }

    .store-btn:active {
      transform: translateY(0px) scale(0.98);
    }

    .btn-icon {
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon svg {
      width: 100%;
      height: 100%;
    }

    .btn-text {
      flex: 1;
    }

    .btn-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #999;
      font-weight: 500;
      display: block;
      margin-bottom: 3px;
    }

    .btn-store {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.01em;
      display: block;
    }

    .btn-arrow {
      color: #999;
      font-size: 20px;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .store-btn:hover .btn-arrow {
      transform: translateX(4px);
      color: #111;
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: #444;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-dots">
        <div class="dots-row">
          <div class="dot dot-y"></div>
        </div>
        <div class="dots-row">
          <div class="dot dot-b"></div>
          <div class="dot dot-g"></div>
        </div>
      </div>
      <div class="logo-text">
        <span class="logo-name">AUGEAS</span>
        <span class="logo-tagline">Turns waste into value</span>
      </div>
    </div>

    <!-- Headline -->
    <div class="headline">
      <h1>Download<br>the App</h1>
      <p>Available on iOS and Android</p>
    </div>

    <div class="divider"></div>

    <!-- Store Buttons -->
    <div class="buttons">

      <!-- Google Play -->
      <a class="store-btn google"
         href="https://play.google.com/store/apps/details?id=com.augeas.user_app&pcampaignid=web_share"
         target="_blank" rel="noopener noreferrer">
        <div class="btn-icon">
          <!-- Google Play Icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.18 23.76C3.06 23.7 3 23.58 3 23.4V0.6C3 0.42 3.06 0.3 3.18 0.24L3.24 0.18L13.14 10.08V10.32L3.24 20.22L3.18 23.76Z" fill="#4285F4"/>
            <path d="M16.5 13.44L13.14 10.08V9.84L16.5 6.48L16.56 6.54L20.58 8.82C21.72 9.48 21.72 10.56 20.58 11.22L16.5 13.44Z" fill="#FBBC04"/>
            <path d="M16.56 13.38L13.14 10.08L3.18 23.76C3.54 24.12 4.08 24.18 4.74 23.82L16.56 13.38Z" fill="#34A853"/>
            <path d="M16.56 6.54L4.74 0.18C4.08 -0.18 3.54 -0.12 3.18 0.24L13.14 10.08L16.56 6.54Z" fill="#EA4335"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Get it on</span>
          <span class="btn-store">Google Play</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <!-- App Store -->
      <a class="store-btn apple"
         href="https://apps.apple.com/be/app/augeas/id6758399114"
         target="_blank" rel="noopener noreferrer">
        <div class="btn-icon">
          <!-- Apple Icon -->
          <svg viewBox="0 0 24 24" fill="#111" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Download on the</span>
          <span class="btn-store">App Store</span>
        </div>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <div class="footer">augeas.io</div>

  </div>
</body>
</html>
