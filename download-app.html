<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download Augeas App</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#111;color:#fff;font-family:'Barlow',sans-serif}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:3rem 2rem;gap:3rem}

    .logo-wrap{display:flex;justify-content:center}
    .logo-wrap img{height:48px;width:auto}

    .headline{text-align:center}
    .headline h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.2rem,6vw,4rem);font-weight:800;text-transform:uppercase;letter-spacing:-.02em;line-height:1.05;color:#fff}
    .headline p{margin-top:.8rem;font-size:1rem;font-weight:300;color:#888;letter-spacing:.02em}

    .qr-wrap{background:#fff;border-radius:16px;padding:1.5rem;display:flex;justify-content:center}
    .qr-wrap img{width:220px;height:220px;object-fit:contain;display:block}

    .store-btns{display:flex;flex-direction:column;gap:1rem;align-items:center;width:100%;max-width:280px}

    .store-btn{display:flex;align-items:center;gap:1rem;background:#fff;color:#111;border-radius:12px;padding:.9rem 1.6rem;text-decoration:none;width:100%;transition:opacity .2s}
    .store-btn:hover{opacity:.85}
    .store-btn svg{flex-shrink:0;width:28px;height:28px}
    .store-btn-text{display:flex;flex-direction:column;line-height:1.2}
    .store-btn-text small{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#555}
    .store-btn-text strong{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:.01em}

    .divider{width:1px;height:40px;background:#333}

    @media(min-width:640px){
      .store-btns{flex-direction:row;max-width:600px}
      .divider{display:block}
    }
  </style>
</head>
